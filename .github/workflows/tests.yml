name: Run tests

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  py_test:
    name: Tests on ${{ matrix.os }} with python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macOS-latest, windows-latest ]
        python-version: [ "3.9", "3.x", "pypy3.9" ]
        exclude:
          - os: macOS-latest
            python-version: "pypy3.9"
          - os: windows-latest
            python-version: "pypy3.9"

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup MSVC DevShell (Windows)
        if: runner.os == 'Windows'
        uses: bus1/cabuild/action/msdevshell@e22aba57d6e74891d059d66501b6b5aed8123c4d  # v1
        with:
          architecture: 'x64'

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies and capture build timings
        run: python scripts/benchmark_install.py --output-dir build-bench --package ".[test]"

      - name: Upload install benchmark artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: install-benchmark-${{ matrix.os }}-${{ matrix.python-version }}
          path: build-bench
          retention-days: 30

      - name: Test with pytest
        run: pytest -s --cov=symusic --cov-report=xml -n auto --durations=0 -v tests

      - name: Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: python

  py314_experimental_runtime_test:
    name: Experimental runtime tests on Ubuntu (3.14 + JIT / 3.14t free-threaded)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.14"
            enable-jit: "1"
            expected-gil-disabled: "0"
          - python-version: "3.14t"
            enable-jit: "0"
            expected-gil-disabled: "1"

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Show runtime info
        run: |
          python -VV
          python -c "import sys, sysconfig; print('python_version=', sys.version); print('Py_GIL_DISABLED=', sysconfig.get_config_var('Py_GIL_DISABLED')); print('has_sys_jit=', hasattr(sys, '_jit'))"

      - name: Install package and test dependencies
        run: python -m pip install --upgrade pip && python -m pip install ".[test]"

      - name: Run full Python test suite under experimental runtime
        env:
          PYTHON_JIT: ${{ matrix.enable-jit }}
          SYMUSIC_EXPECT_GIL_DISABLED: ${{ matrix.expected-gil-disabled }}
        run: |
          pytest -s -n auto --durations=0 -v tests

  cpp_test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest, windows-latest, macOS-latest ]

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup MSVC DevShell (Windows)
        if: runner.os == 'Windows'
        uses: bus1/cabuild/action/msdevshell@e22aba57d6e74891d059d66501b6b5aed8123c4d  # v1
        with:
          architecture: 'x64'

      - name: Install gcovr (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y gcovr

      - name: Install gcovr (macOS)
        if: runner.os == 'macOS'
        run: brew install gcovr

      - name: Configure CMake with Coverage
        if: runner.os != 'Windows'
        run: cmake -S . -Bbuild -DBUILD_SYMUSIC_TEST:BOOL=ON -DCMAKE_BUILD_TYPE=Debug -DENABLE_COVERAGE:BOOL=ON -DCMAKE_POLICY_VERSION_MINIMUM=3.5

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        run: cmake -S . -Bbuild -G Ninja -DBUILD_SYMUSIC_TEST:BOOL=ON -DCMAKE_BUILD_TYPE=Debug -DCMAKE_POLICY_VERSION_MINIMUM=3.5

      - name: Build
        run: cmake --build build --config Debug

      - name: Run CPP Tests
        run: |
          cd build
          ctest -C Debug --output-on-failure --verbose

      - name: Generate Coverage Report
        if: runner.os != 'Windows'
        run: |
          cd build
          gcovr --xml --output=coverage.xml -r .. --filter="../src/" --filter="../include/" --exclude="../3rdparty/" --exclude="_deps/" --gcov-ignore-errors=no_working_dir_found

      - name: Codecov
        if: runner.os != 'Windows'
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./build/coverage.xml
          flags: cpp
